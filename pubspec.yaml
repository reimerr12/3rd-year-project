name: krishok_app
description: Krishok - Agricultural platform for Bangladeshi farmers
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3+1

  # Maps & location
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Firebase / FCM
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2

  # Charts
  fl_chart: ^0.68.0

  # UI utilities
  intl: ^0.20.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Connectivity
  connectivity_plus: ^6.0.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
